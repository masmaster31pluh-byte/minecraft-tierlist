<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Tier List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-grid {
      display: grid;
      grid-template-columns: repeat(4, 10px);
      gap: 2px;
    }

    .logo-grid span {
      width: 10px;
      height: 10px;
      display: block;
    }

    .logo-title {
      font-size: 28px;
      font-weight: 900;
      color: white;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-style: italic;
    }

    .logo-title span { color: #e74c3c; }

    .add-player {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .add-player input {
      background: #2a2a2a;
      border: 2px solid #444;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      width: 200px;
      transition: border-color 0.2s;
    }

    .add-player input:focus { border-color: #e74c3c; }

    .add-player button {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .add-player button:hover { background: #c0392b; }

    .tier-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tier-row {
      display: flex;
      min-height: 80px;
      border: 1px solid #333;
    }

    .tier-label {
      width: 80px;
      min-width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 900;
      color: #111;
      user-select: none;
    }

    .tier-S .tier-label { background: #ff7f7f; }
    .tier-A .tier-label { background: #ffbf7f; }
    .tier-B .tier-label { background: #ffdf7f; }
    .tier-C .tier-label { background: #ffff7f; }
    .tier-D .tier-label { background: #bfff7f; }
    .tier-F .tier-label { background: #7fff7f; }

    .tier-content {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #2a2a2a;
      min-height: 80px;
    }

    .tier-content.drag-over {
      background: #3a3a3a;
      outline: 2px dashed #e74c3c;
    }

    .player-head {
      width: 64px;
      height: 64px;
      cursor: grab;
      image-rendering: pixelated;
      border: 2px solid transparent;
      border-radius: 4px;
      transition: transform 0.1s, border-color 0.1s;
      position: relative;
    }

    .player-head:hover {
      transform: scale(1.1);
      border-color: #e74c3c;
    }

    .player-head:active { cursor: grabbing; }

    .player-head.dragging {
      opacity: 0.4;
    }

    .player-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: grab;
    }

    .player-wrapper:active { cursor: grabbing; }

    .player-name {
      color: #ccc;
      font-size: 10px;
      text-align: center;
      max-width: 64px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .unranked-section {
      margin-top: 20px;
    }

    .unranked-label {
      color: #888;
      font-size: 13px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .unranked-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      background: #222;
      border: 1px solid #333;
      min-height: 90px;
    }

    .unranked-pool.drag-over {
      background: #2e2e2e;
      outline: 2px dashed #e74c3c;
    }

    .error-msg {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-grid" id="logoGrid"></div>
    <div class="logo-title">Tier<span>maker</span></div>
  </div>
  <div>
    <div class="add-player">
      <input type="text" id="usernameInput" placeholder="Minecraft username..." />
      <button onclick="addPlayer()">Add Player</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</header>

<div class="tier-list" id="tierList"></div>

<div class="unranked-section">
  <div class="unranked-label">Unranked Players</div>
  <div class="unranked-pool" id="unrankedPool" data-tier="unranked"></div>
</div>

<script>
  // Build colorful logo grid
  const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e74c3c','#f39c12','#27ae60','#2980b9','#8e44ad','#16a085','#d35400','#c0392b','#7f8c8d'];
  const grid = document.getElementById('logoGrid');
  colors.forEach(c => {
    const s = document.createElement('span');
    s.style.background = c;
    grid.appendChild(s);
  });

  const tiers = ['S', 'A', 'B', 'C', 'D', 'F'];
  const tierList = document.getElementById('tierList');

  // Build tier rows
  tiers.forEach(tier => {
    const row = document.createElement('div');
    row.className = `tier-row tier-${tier}`;
    row.innerHTML = `
      <div class="tier-label">${tier}</div>
      <div class="tier-content" data-tier="${tier}" id="tier-${tier}"></div>
    `;
    tierList.appendChild(row);
  });

  // Drag state
  let dragEl = null;
  let dragSource = null;

  function makeDraggable(wrapper) {
    wrapper.setAttribute('draggable', 'true');

    wrapper.addEventListener('dragstart', e => {
      dragEl = wrapper;
      dragSource = wrapper.parentElement;
      setTimeout(() => wrapper.querySelector('.player-head').classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });

    wrapper.addEventListener('dragend', () => {
      wrapper.querySelector('.player-head').classList.remove('dragging');
      dragEl = null;
      dragSource = null;
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
  }

  function setupDropZone(zone) {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      zone.classList.add('drag-over');
    });

    zone.addEventListener('dragleave', e => {
      if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
    });

    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (dragEl && dragEl !== zone) {
        zone.appendChild(dragEl);
      }
    });
  }

  // Setup all drop zones
  document.querySelectorAll('.tier-content').forEach(setupDropZone);
  setupDropZone(document.getElementById('unrankedPool'));

  // Add player
  async function addPlayer() {
    const input = document.getElementById('usernameInput');
    const errorMsg = document.getElementById('errorMsg');
    const username = input.value.trim();
    errorMsg.textContent = '';

    if (!username) return;

    // mc-heads.net accepts usernames directly
    const headUrl = `https://mc-heads.net/avatar/${encodeURIComponent(username)}/64`;

    const wrapper = document.createElement('div');
    wrapper.className = 'player-wrapper';

    const img = document.createElement('img');
    img.className = 'player-head';
    img.src = headUrl;
    img.alt = username;
    img.title = username;

    img.onerror = () => {
      // fallback to Steve head if image fails to load
      img.src = `https://mc-heads.net/avatar/MHF_Steve/64`;
    };

    const nameEl = document.createElement('div');
    nameEl.className = 'player-name';
    nameEl.textContent = username;

    wrapper.appendChild(img);
    wrapper.appendChild(nameEl);
    makeDraggable(wrapper);

    document.getElementById('unrankedPool').appendChild(wrapper);
    input.value = '';
  }

  // Allow pressing Enter to add
  document.getElementById('usernameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });
</script>
</body>
</html>
